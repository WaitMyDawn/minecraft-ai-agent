spring.application.name=Minecraft-AI-Agent

ai.api.key=${DEEPSEEK_API_KEY:}
ai.api.url=https://api.deepseek.com/v1

maa.encryption.secret=${MAA_ENCRYPTION_SECRET:}

maa.allow-registration=${MAA_ALLOW_REGISTRATION:false}

spring.datasource.url=jdbc:h2:file:./maa_db/knowledge;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.threads.virtual.enabled=true

maa.sandbox.base-server-dir=${MAA_SANDBOX_DIR:}
maa.sandbox.max-concurrent=1
maa.sandbox.timeout-seconds=300
maa.sandbox.server-memory=2G

curseforge.api.key=${CURSEFORGE_API_KEY:}

spring.task.scheduling.pool.size=2
